<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #1e293b; color: #f1f5f9; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #38bdf8; }
        .container { max-width: 1400px; margin: 0 auto; }
        .project-card {
            background: #334155;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .project-title { color: #38bdf8; font-size: 24px; font-weight: bold; flex: 1; }
        .platform-badge { background: #475569; color: #e2e8f0; padding: 4px 12px; border-radius: 20px; font-size: 14px; margin-left: 10px; }
        .project-description { color: #94a3b8; margin-bottom: 15px; }
        .section-title { color: #e2e8f0; font-weight: bold; margin: 10px 0 5px 0; }
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #f1f5f9;
            margin-bottom: 10px;
            min-height: 60px;
            font-family: monospace;
        }
        textarea:focus { outline: 2px solid #38bdf8; }
        .link-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .link-row input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: #f1f5f9; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-add { background: #475569; color: #e2e8f0; }
        .btn-save { background: #38bdf8; color: #1e293b; width: 100%; margin-top: 10px; }
        .btn-save:hover { background: #0ea5e9; }
        .field-group { margin-bottom: 15px; }
        .links-list { margin-top: 5px; }
    </style>
</head>
<body>
    <h1>📁 Mes Projets</h1>
    <div class="container" id="projects-container"></div>

    <script>
        const projects = [
            {
                name: "Edf-Offer-UI",
                platform: "GitLab",
                description: "Interface React pour la gestion des offres EDF",
                links: [
                    { label: "Repo", url: "https://gitlab.com/spham/Edf-Offer-UI" },
                    { label: "Preview", url: "" }
                ],
                notes: [
                    "16 commits hier",
                    "Export DOCX implémenté",
                    "Diagrammes Mermaid"
                ]
            },
            {
                name: "devtra",
                platform: "GitHub",
                description: "Projet personnel en développement",
                links: [
                    { label: "Repo", url: "https://github.com/spham/devtra" }
                ],
                notes: [
                    "Dernier push : 19 mars",
                    "Projet privé"
                ]
            },
            {
                name: "ticketbeast",
                platform: "GitHub",
                description: "Backend pour la gestion de billetterie",
                links: [
                    { label: "Repo", url: "https://github.com/nothingworksinc/ticketbeast" }
                ],
                notes: [
                    "Laravel project"
                ]
            },
            {
                name: "pastemd",
                platform: "GitHub",
                description: "Tool pour copier/coller du texte",
                links: [
                    { label: "Repo", url: "https://github.com/spham/pastemd" }
                ],
                notes: [
                    "Push récent : 9 mars"
                ]
            },
            {
                name: "testing-laravel-blog-pest",
                platform: "GitHub",
                description: "Blog Laravel avec tests Pest",
                links: [
                    { label: "Repo", url: "https://github.com/spham/testing-laravel-blog-pest" }
                ],
                notes: [
                    ""
                ]
            }
        ];

        function saveToLocalStorage() {
            localStorage.setItem('myProjects', JSON.stringify(projects));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('myProjects');
            if (saved) {
                return JSON.parse(saved);
            }
            return projects;
        }

        function renderProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            loadFromLocalStorage().forEach((project, pIndex) => {
                const card = document.createElement('div');
                card.className = 'project-card';

                let linksHtml = '';
                project.links.forEach((link, lIndex) => {
                    linksHtml += `
                        <div class="link-row">
                            <input type="text" value="${link.label}" placeholder="Label" data-p="${pIndex}-l${lIndex}-label" onchange="updateData()">
                            <input type="text" value="${link.url}" placeholder="URL" data-p="${pIndex}-l${lIndex}-url" onchange="updateData()">
                        </div>
                    `;
                });
                linksHtml += `<button class="btn btn-add" onclick="addLink(${pIndex})">➕ Lien</button>`;

                let notesHtml = '';
                project.notes.forEach((note, nIndex) => {
                    notesHtml += `
                        <textarea data-p="${pIndex}-n${nIndex}" onchange="updateData()">${note}</textarea>
                    `;
                });
                notesHtml += `<button class="btn btn-add" onclick="addNote(${pIndex})">➕ Note</button>`;

                card.innerHTML = `
                    <div class="project-header">
                        <div class="project-title">${project.name}</div>
                        <div class="platform-badge">${project.platform}</div>
                    </div>
                    <div class="project-description">${project.description}</div>
                    
                    <div class="field-group">
                        <div class="section-title">🔗 Liens</div>
                        <div class="links-list">${linksHtml}</div>
                    </div>
                    
                    <div class="field-group">
                        <div class="section-title">📝 Notes</div>
                        <div class="links-list">${notesHtml}</div>
                    </div>
                    
                    <button class="btn btn-save" onclick="saveProject(${pIndex})">💾 Sauvegarder</button>
                `;

                container.appendChild(card);
            });
        }

        function updateData() {
            const allProjects = loadFromLocalStorage();
            document.querySelectorAll('input[data-p], textarea[data-p]').forEach(el => {
                const parts = el.dataset.p.split('-');
                const pIndex = parseInt(parts[0]);
                const type = parts[1];
                const index = parseInt(parts[2]);

                if (type === 'l') {
                    if (!allProjects[pIndex].links[index]) {
                        allProjects[pIndex].links[index] = {};
                    }
                    if (parts[3] === 'label') {
                        allProjects[pIndex].links[index].label = el.value;
                    } else if (parts[3] === 'url') {
                        allProjects[pIndex].links[index].url = el.value;
                    }
                } else if (type === 'n') {
                    allProjects[pIndex].notes[index] = el.value;
                }
            });
            saveToLocalStorage();
        }

        function addLink(pIndex) {
            const allProjects = loadFromLocalStorage();
            allProjects[pIndex].links.push({ label: "", url: "" });
            saveToLocalStorage();
            renderProjects();
        }

        function addNote(pIndex) {
            const allProjects = loadFromLocalStorage();
            allProjects[pIndex].notes.push("");
            saveToLocalStorage();
            renderProjects();
        }

        function saveProject(pIndex) {
            updateData();
            alert(`Projet "${loadFromLocalStorage()[pIndex].name}" sauvegardé !`);
        }

        renderProjects();
    </script>
</body>
</html>
